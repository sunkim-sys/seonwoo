<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Tools - 매뉴얼 접속 로그</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .doclog-summary-wrap, .doclog-raw-wrap {
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: auto;
      max-height: 460px;
      background: var(--surface);
      margin-bottom: 32px;
    }
    .doclog-filter {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 16px;
    }
    .doclog-filter input {
      flex: 1;
      padding: 11px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      background: var(--surface);
    }
    .doclog-section-title {
      font-size: 16px;
      font-weight: 700;
      margin: 28px 0 12px;
    }
    .doclog-hint {
      font-size: 12.5px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <button id="sidebarToggle" aria-label="메뉴">☰</button>
    <button id="themeToggle" aria-label="테마">🌙</button>
  </div>
  <aside class="sidebar">
    <h1>Web Tools</h1>
    <nav>
      <a href="/">홈</a>
      <a href="/pages/ipgwa.html">입과 템플릿 변환</a>
      <a href="/pages/lecture-info.html">강의 정보 정리</a>
      <a href="/pages/recommend.html">강의 추천</a>
      <a href="/pages/catalog.html">과정 리스트</a>
      <a href="/pages/categorize.html">카테고리 자동 분류</a>
      <a href="/pages/report.html">콘텐츠 현황</a>
      <a href="/pages/result-report.html">결과 보고서</a>
      <a href="/pages/members.html">구성원 다운로드</a>
      <a href="/pages/doc-logs.html" class="active">매뉴얼 접속 로그</a>
    </nav>
  </aside>

  <main class="main">
    <h2>매뉴얼 접속 로그</h2>
    <p class="desc">채널톡 도움말센터(docs.channel.io) 문서 페이지에 삽입한 추적 스크립트가 보낸 조회 기록입니다.</p>

    <div id="loading" class="loading">데이터를 불러오고 있습니다...</div>

    <div id="content" style="display:none;">
      <div class="doclog-section-title">매뉴얼별 조회수</div>
      <div class="doclog-summary-wrap">
        <table class="preview-table">
          <thead>
            <tr><th>매뉴얼(문서)</th><th>URL</th><th>조회수</th><th>마지막 조회</th></tr>
          </thead>
          <tbody id="summaryBody"></tbody>
        </table>
      </div>

      <div class="doclog-section-title">최근 접속 로그</div>
      <p class="doclog-hint">최근 500건까지 표시됩니다.</p>
      <div class="doclog-filter">
        <input type="text" id="filterInput" placeholder="매뉴얼 제목, URL로 검색...">
      </div>
      <div class="doclog-raw-wrap">
        <table class="preview-table">
          <thead>
            <tr><th>시각</th><th>매뉴얼</th><th>Referrer</th><th>IP</th><th>User-Agent</th></tr>
          </thead>
          <tbody id="rawBody"></tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="/js/layout.js"></script>
  <script src="/js/doc-logs.js"></script>
</body>
</html>
