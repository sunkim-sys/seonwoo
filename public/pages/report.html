<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Tools - 콘텐츠 현황 레포트</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/report.css">
</head>
<body>
  <div class="topbar">
    <button id="sidebarToggle" aria-label="메뉴">☰</button>
    <button id="themeToggle" aria-label="테마">🌙</button>
  </div>
  <aside class="sidebar">
    <h1>Web Tools</h1>
    <nav>
      <a href="/">홈</a>
      <a href="/pages/ipgwa.html">입과 템플릿 변환</a>
      <a href="/pages/lecture-info.html">강의 정보 정리</a>
      <a href="/pages/recommend.html">강의 추천</a>
      <a href="/pages/catalog.html">과정 리스트</a>
      <a href="/pages/categorize.html">카테고리 자동 분류</a>
      <a href="/pages/report.html" class="active">콘텐츠 현황</a>
      <a href="/pages/members.html">구성원 다운로드</a>
      <a href="/pages/company-status.html">기업별 학습 현황</a>
    </nav>
  </aside>

  <main class="main report-main">
    <h2>콘텐츠 현황 레포트</h2>

    <!-- 뷰 모드 탭 -->
    <div class="report-actions-bar">
      <div class="view-mode-tabs" id="viewModeTabs">
        <button class="vm-btn active" data-mode="summary">전체 누적</button>
        <button class="vm-btn" data-mode="month">월별</button>
        <button class="vm-btn" data-mode="range">기간 선택</button>
      </div>
      <div style="display:flex;gap:8px;">
        <button id="exportReportBtn" class="btn-export-report">PNG 저장</button>
        <button id="exportExcelBtn" class="btn-export-report">Excel 저장</button>
      </div>
    </div>

    <!-- 세부 선택자 -->
    <div class="sub-selector" id="subSelector"></div>
    <div class="range-label" id="rangeLabel"></div>

    <!-- 상세 모달 -->
    <div id="reportModal" class="report-modal" style="display:none;">
      <div class="report-modal-content">
        <button class="report-modal-close" id="reportModalClose">&times;</button>
        <div id="reportModalBody"></div>
      </div>
    </div>

    <div id="loading" class="loading">데이터를 불러오고 있습니다...</div>

    <div id="dashboard" style="display:none;">
      <!-- KPI 카드 -->
      <div id="kpiCards" class="kpi-grid"></div>

      <!-- 월별 추이 -->
      <div class="section">
        <h3>콘텐츠 월별 추이</h3>
        <div class="chart-container" id="trendChart"></div>
      </div>

      <!-- TOP 10 -->
      <div class="two-col">
        <div class="section">
          <h3>싱글플랜 TOP 10</h3>
          <div id="singleTop"></div>
        </div>
        <div class="section">
          <h3>올플랜 TOP 10</h3>
          <div id="allplanTop"></div>
        </div>
      </div>

      <!-- 카테고리별 TOP -->
      <div class="section" id="categoryTopsSection" style="display:none;">
        <div class="category-top-header">
          <h3>카테고리별 TOP 강의</h3>
          <select id="categorySelect"></select>
        </div>
        <div id="categoryTopList"></div>
      </div>

      <!-- 카테고리 순위 (Summary only) -->
      <div class="section" id="categoryRankSection">
        <h3>카테고리별 수강인원</h3>
        <div class="two-col">
          <div id="categoryChart"></div>
          <div id="subCategoryChart"></div>
        </div>
      </div>
    </div>
  </main>

  <div id="barTooltip" class="bar-tooltip" style="display:none;pointer-events:none;position:fixed;"></div>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="/js/layout.js"></script>
  <script src="/js/report.js"></script>
</body>
</html>
