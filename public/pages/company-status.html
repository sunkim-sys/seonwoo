<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Tools - 기업별 학습 현황</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .cs-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .cs-table th, .cs-table td {
      padding: 9px 14px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .cs-table th {
      font-weight: 600;
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .cs-table tbody tr:hover { background: var(--hover-bg, rgba(255,255,255,0.04)); }
    .cs-table .td-count { font-weight: 600; color: var(--accent); }
    .cs-table .td-rank { color: var(--text-muted); width: 40px; }
    .cs-result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .cs-result-header h3 { margin: 0; font-size: 15px; }
    .cs-summary-badge {
      font-size: 12px;
      color: var(--text-muted);
      margin-left: 10px;
    }
    .cs-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .cs-modal-content {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      width: 100%;
      max-width: 860px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .cs-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .cs-modal-header h3 { margin: 0; font-size: 15px; }
    .cs-modal-close {
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      color: var(--text-muted);
      line-height: 1;
    }
    .cs-modal-body { overflow-y: auto; }
  </style>
</head>
<body>
  <div class="topbar">
    <button id="sidebarToggle" aria-label="메뉴">☰</button>
    <button id="themeToggle" aria-label="테마">🌙</button>
  </div>
  <aside class="sidebar">
    <h1>Web Tools</h1>
    <nav>
      <a href="/">홈</a>
      <a href="/pages/ipgwa.html">입과 템플릿 변환</a>
      <a href="/pages/lecture-info.html">강의 정보 정리</a>
      <a href="/pages/recommend.html">강의 추천</a>
      <a href="/pages/catalog.html">과정 리스트</a>
      <a href="/pages/categorize.html">카테고리 자동 분류</a>
      <a href="/pages/report.html">콘텐츠 현황</a>
      <a href="/pages/members.html">구성원 다운로드</a>
      <a href="/pages/company-status.html" class="active">기업별 학습 현황</a>
    </nav>
  </aside>

  <main class="main">
    <h2>기업별 학습 현황</h2>
    <p class="desc">구성원 다운로드로 받은 통합 엑셀 파일을 업로드하면 기업별 인원 현황과 명단을 정리합니다.</p>

    <div class="upload-area" id="uploadArea">
      <input type="file" id="fileInput" accept=".xlsx,.xls,.csv">
      <div class="icon">&#128194;</div>
      <p>클릭하거나 파일을 드래그하세요</p>
      <p style="font-size:12px; color:#94a3b8; margin-top:4px;">구성원_전체.xlsx · 개별 기업 .csv 모두 지원</p>
      <div class="filename" id="fileName"></div>
    </div>

    <button class="btn btn-primary" id="analyzeBtn" style="margin-top:16px;" disabled>분석 시작</button>

    <div class="status" id="status" style="display:none;"></div>

    <div id="results" style="display:none; margin-top:24px;">
      <div class="cs-result-header">
        <h3>분석 결과 <span class="cs-summary-badge" id="resultSummary"></span></h3>
        <button class="btn btn-primary" id="exportBtn" style="font-size:13px;padding:7px 16px;">Excel 내보내기</button>
      </div>
      <div class="section" style="padding:0;">
        <div id="companyTable"></div>
      </div>
    </div>
  </main>

  <!-- Member detail modal -->
  <div id="detailModal" class="cs-modal">
    <div class="cs-modal-content">
      <div class="cs-modal-header">
        <h3 id="detailTitle"></h3>
        <button class="cs-modal-close" id="detailClose">&times;</button>
      </div>
      <div class="cs-modal-body" id="detailBody"></div>
    </div>
  </div>

  <script src="/js/layout.js"></script>
  <script src="/js/company-status.js"></script>
</body>
</html>
