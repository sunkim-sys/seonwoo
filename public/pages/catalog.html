<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Tools - 과정 리스트</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/catalog.css">
</head>
<body>
  <div class="topbar">
    <button id="sidebarToggle" aria-label="메뉴">☰</button>
    <button id="themeToggle" aria-label="테마">🌙</button>
  </div>
  <aside class="sidebar">
    <h1>Web Tools</h1>
    <nav>
      <a href="/">홈</a>
      <a href="/pages/ipgwa.html">입과 템플릿 변환</a>
      <a href="/pages/lecture-info.html">강의 정보 정리</a>
      <a href="/pages/recommend.html">강의 추천</a>
      <a href="/pages/catalog.html" class="active">과정 리스트</a>
      <a href="/pages/categorize.html">카테고리 자동 분류</a>
      <a href="/pages/report.html">콘텐츠 현황</a>
      <a href="/pages/members.html">구성원 다운로드</a>
      <a href="/pages/company-status.html">기업별 학습 현황</a>
    </nav>
  </aside>

  <main class="main catalog-main">
    <h2>과정 리스트</h2>

    <!-- 필터 바 -->
    <div class="filter-bar">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="강의명 또는 소개 검색...">
      </div>
      <div class="filter-selects">
        <select id="filterCategory">
          <option value="">전체 카테고리</option>
        </select>
        <select id="filterSub">
          <option value="">전체 서브카테고리</option>
        </select>
        <select id="filterLevel">
          <option value="">전체 난이도</option>
        </select>
        <select id="sortBy">
          <option value="default">기본순</option>
          <option value="name-asc">이름 (가나다)</option>
          <option value="name-desc">이름 (역순)</option>
          <option value="level">난이도</option>
          <option value="category">카테고리</option>
        </select>
        <button id="filterResetBtn" class="btn-filter-reset" style="display:none;">✕ 초기화</button>
      </div>
    </div>

    <div class="result-row">
      <div class="result-count" id="resultCount"></div>
      <div class="result-actions">
        <button id="favBtn" class="btn-toggle-fav">⭐ 즐겨찾기만 보기</button>
        <button id="exportFavBtn" class="btn-export-fav">즐겨찾기 내보내기</button>
        <button id="shareUrlBtn" class="btn-share-url">🔗 URL 복사</button>
      </div>
    </div>

    <!-- 로딩 -->
    <div id="loading" class="loading">데이터를 불러오고 있습니다...</div>

    <!-- 카드 리스트 -->
    <div id="catalogList" class="catalog-list"></div>

    <!-- 페이지네이션 -->
    <div id="pagination" class="pagination"></div>

    <!-- 상세 모달 -->
    <div id="modal" class="modal" style="display:none;">
      <div class="modal-content">
        <button class="modal-close" id="modalClose">&times;</button>
        <div id="modalBody"></div>
      </div>
    </div>

    <!-- 비교 모달 -->
    <div id="compareModal" class="modal" style="display:none;">
      <div class="modal-content compare-modal-content">
        <button class="modal-close" id="compareModalClose">&times;</button>
        <h3 class="compare-modal-title">강의 비교</h3>
        <div id="compareBody" class="compare-grid"></div>
      </div>
    </div>
  </main>

  <!-- 비교 플로팅 바 -->
  <div id="compareBar" class="compare-bar" style="display:none;">
    <span id="compareCount">0개 선택됨</span>
    <button id="doCompareBtn" class="btn-do-compare" disabled>비교하기</button>
    <button id="clearCompareBtn" class="btn-clear-compare">✕ 취소</button>
  </div>

  <script src="/js/layout.js"></script>
  <script src="/js/catalog.js"></script>
</body>
</html>
