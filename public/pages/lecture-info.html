  <link rel="stylesheet" href="/css/lecture-info.css">
</head>
<body>
  <div class="topbar">
    <button id="sidebarToggle" aria-label="메뉴">☰</button>
    <button id="themeToggle" aria-label="테마">🌙</button>
  </div>
  <aside class="sidebar">
    <h1>Web Tools</h1>
    <nav>
      <a href="/">입과 템플릿 변환</a>
      <a href="/pages/lecture-info.html" class="active">강의 정보 정리</a>

  <main class="main">
    <h2>강의 정보 정리</h2>
    <p class="desc">AI가 강의 정보를 요약하여 엑셀 파일로 다운로드할 수 있습니다.</p>

    <div class="input-section">
      <div class="input-head">
        <h3>강의명 입력</h3>
        <span class="line-counter" id="lineCounter">0개 강의</span>
      </div>
      <p class="hint">강의명을 한 줄에 하나씩 입력하세요. <a href="https://docs.google.com/spreadsheets/d/1A82erZFIPkpgrM3JHV9fktfwqfsBFYrA3uZ5zAoyw7I/edit?gid=633723179" target="_blank" rel="noopener">과정 리스트</a>에서 자동으로 정보를 가져옵니다.</p>
      <textarea id="lectureNames" rows="8" placeholder="유니티 게임 포트폴리오 완성&#10;김민태의 프론트엔드 아카데미 : 제 1강 JavaScript & TypeScript Essential&#10;DT 세미나: Cloud(클라우드) - 지속 가능 경영을 위한 클라우드"></textarea>
    </div>
    <div class="action-bar">
      <button class="btn btn-primary" id="searchBtn">AI 요약</button>
    </div>

    <div class="status" id="status"></div>

    <div id="results" class="li-results" style="display:none;">
      <div class="li-results-head">
        <h3>요약 결과 <span id="resultCount" class="li-result-count"></span></h3>
        <button class="btn btn-download-original" id="downloadBtn">엑셀 다운로드</button>
      </div>
      <div id="resultList" class="li-result-list"></div>
    </div>
  </main>

  <script src="/js/layout.js"></script>
  <script src="/js/lecture-info.js"></script>
