<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Tools - 구성원 다운로드</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .members-form { max-width: 600px; }
    .members-form label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 14px; }
    .members-form textarea {
      width: 100%;
      height: 180px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--input-bg);
      color: var(--text);
      font-size: 14px;
      resize: vertical;
      box-sizing: border-box;
      font-family: inherit;
    }
    .members-form textarea:focus { outline: 2px solid var(--accent); border-color: transparent; }
    .members-hint { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
    #runBtn { margin-top: 16px; }
    #progressBox {
      margin-top: 20px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      display: none;
    }
    #progressBox h4 { margin: 0 0 10px; font-size: 14px; }
    #logArea {
      font-size: 13px;
      line-height: 1.7;
      max-height: 260px;
      overflow-y: auto;
      color: var(--text-muted);
      white-space: pre-wrap;
      word-break: break-all;
    }
    #logArea .log-ok { color: #4ade80; }
    #logArea .log-err { color: #f87171; }
    #downloadBox {
      margin-top: 20px;
      display: none;
    }
    #downloadBox h4 { font-size: 14px; margin: 0 0 10px; }
    .dl-list { display: flex; flex-direction: column; gap: 8px; }
    .dl-item {
      display: flex; align-items: center; gap: 10px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
    }
    .dl-item span { flex: 1; font-size: 13px; }
    .dl-merged { border-color: var(--accent); }
    .dl-merged span { font-weight: 600; }
  </style>
</head>
<body>
  <div class="topbar">
    <button id="sidebarToggle" aria-label="메뉴">☰</button>
    <button id="themeToggle" aria-label="테마">🌙</button>
  </div>
  <aside class="sidebar">
    <h1>Web Tools</h1>
    <nav>
      <a href="/">홈</a>
      <a href="/pages/ipgwa.html">입과 템플릿 변환</a>
      <a href="/pages/lecture-info.html">강의 정보 정리</a>
      <a href="/pages/recommend.html">강의 추천</a>
      <a href="/pages/catalog.html">과정 리스트</a>
      <a href="/pages/categorize.html">카테고리 자동 분류</a>
      <a href="/pages/report.html">콘텐츠 현황</a>
      <a href="/pages/members.html" class="active">구성원 다운로드</a>
    </nav>
  </aside>

  <main class="main">
    <h2>구성원 다운로드</h2>
    <p class="desc">Skillflo 파트너 포털에서 기업별 구성원 명단을 자동으로 다운로드하고 하나의 Excel 파일로 통합합니다.</p>

    <div class="members-form">
      <label for="companiesInput">기업명 입력 <span style="font-weight:400">(한 줄에 하나씩)</span></label>
      <textarea id="companiesInput" placeholder="키움증권
키움저축은행
사람인
다우기술"></textarea>
      <p class="members-hint">슬래시(/)가 포함된 경우 앞부분으로 검색합니다 — 예: 게티이미지/이매진스</p>
      <button class="btn btn-primary" id="runBtn">다운로드 시작</button>
    </div>

    <div id="progressBox">
      <h4>진행 상황</h4>
      <div id="logArea"></div>
      <button id="retryBtn" class="btn btn-primary" style="display:none;margin-top:12px;">다시 시도</button>
    </div>

    <div id="downloadBox">
      <h4>다운로드</h4>
      <div class="dl-list" id="dlList"></div>
    </div>
  </main>

  <script src="/js/layout.js"></script>
  <script src="/js/members.js"></script>
</body>
</html>
