<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Tools - 수강생 데이터 클렌징</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/cleansing.css">
</head>
<body>
  <div class="topbar">
    <button id="sidebarToggle" aria-label="메뉴">☰</button>
    <button id="themeToggle" aria-label="테마">🌙</button>
  </div>
  <aside class="sidebar">
    <h1>Web Tools</h1>
    <nav>
      <a href="/">입과 템플릿 변환</a>
      <a href="/pages/lecture-info.html">강의 정보 정리</a>
      <a href="/pages/recommend.html">강의 추천</a>
      <a href="/pages/catalog.html">과정 리스트</a>
      <a href="/pages/categorize.html">카테고리 자동 분류</a>
      <a href="/pages/cleansing.html" class="active">수강생 데이터 클렌징</a>
      <a href="/pages/report.html">콘텐츠 현황</a>
    </nav>
  </aside>

  <main class="main">
    <h2>수강생 데이터 클렌징</h2>
    <p class="desc">엑셀을 업로드하면 이름·이메일·전화번호를 정규화하고 중복/형식 오류를 검출합니다.</p>

    <div class="upload-area" id="uploadArea">
      <input type="file" id="fileInput" accept=".xlsx,.xls">
      <div class="icon">&#128194;</div>
      <p>클릭하거나 파일을 드래그하세요</p>
      <p style="font-size:12px; color:#94a3b8; margin-top:4px;">.xlsx 파일만 지원</p>
      <div class="filename" id="fileName"></div>
    </div>

    <div class="action-bar">
      <button class="btn btn-primary" id="uploadBtn" disabled>분석 시작</button>
    </div>

    <div class="status" id="status"></div>

    <div id="results" class="cl-results" style="display:none;">
      <div class="cl-summary" id="clSummary"></div>

      <div class="cl-section" id="clIssuesSection" style="display:none;">
        <h3>형식 오류 / 중복</h3>
        <div id="clIssues"></div>
        <div class="cl-actions">
          <button class="btn btn-secondary" id="applyBtn">수정 적용</button>
        </div>
      </div>

      <div class="cl-section">
        <div class="cl-section-head">
          <h3>클렌징 미리보기</h3>
          <button class="btn btn-download-original" id="downloadBtn">엑셀 다운로드</button>
        </div>
        <div class="cl-preview-wrap">
          <table class="cl-preview" id="clPreview"></table>
        </div>
      </div>
    </div>
  </main>

  <script src="/js/layout.js"></script>
  <script src="/js/cleansing.js"></script>
</body>
</html>
